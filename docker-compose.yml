---
services:
  db:
    container_name: db
    image: postgres:15.3
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./backend/db-init:/docker-entrypoint-initdb.d
    ports:
      - '5432:5432'
    env_file:
      - ./.env
    networks:
      - backend
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    command: ['postgres', '-c', 'log_statement=all', '-c', 'log_duration=on']
    restart: always

  frontend:
    container_name: frontend
    build: ./frontend
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    ports:
      - "80:3000"
    env_file:
      - ./.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --port 3000 --host 0.0.0.0
    depends_on:
      - backend
    networks:
      - backend
    tty: true
    restart: always

  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: ./Dockerfile.python
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      backend:
        aliases:
          - elasticmq
    ports:
      - '3000:3000'
    env_file:
      - ./.env
    environment:
      DMZ_SYNC_ENDPOINT: "http://backend:3000"
      CF_API_KEY: "${CF_API_KEY}"
    depends_on:
      - db
    restart: always

  minio:
    container_name: minio
    image: bitnami/minio:2020.9.26
    user: root
    command: 'minio server /data'
    networks:
      - backend
    volumes:
      - ./minio-data:/data
    ports:
      - 9000:9000
    environment:
      - MINIO_ACCESS_KEY=aws_access_key
      - MINIO_SECRET_KEY=aws_secret_key
    logging:
      driver: json-file
    restart: always

  docs:
    container_name: docs
    build:
      context: ./
      dockerfile: ./Dockerfile.docs
    volumes:
      - ./docs/src:/app/docs/src
      - ./docs/gatsby-browser.js:/app/docs/gatsby-browser.js
      - ./docs/gatsby-config.js:/app/docs/gatsby-config.js
      - ./docs/gatsby-node.js:/app/docs/gatsby-node.js
    ports:
      - '4000:4000'
      - '44475:44475'
    restart: always

  es:
    container_name: es
    image: docker.elastic.co/elasticsearch/elasticsearch:7.9.0
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    command: ['elasticsearch', '-Elogger.level=WARN']
    networks:
      - backend
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - 9200:9200
      - 9300:9300
    logging:
      driver: json-file
    restart: always

  redis:
    container_name: redis
    image: redis:7.0
    ports:
      - "6379:6379"
    networks:
      - backend
    restart: always

  # kib:
  #   image: docker.elastic.co/kibana/kibana:7.9.0
  #   networks:
  #     - backend
  #   ports:
  #     - 5601:5601
  #   environment:
  #     ELASTICSEARCH_URL: http://es:9200
  #     ELASTICSEARCH_HOSTS: http://es:9200
  #     LOGGING_QUIET: 'true'

  matomodb:
    container_name: matomodb
    image: mariadb:11.4
    command: --max-allowed-packet=64MB
    networks:
      - backend
    volumes:
      - ./matomo-db-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=password
    logging:
      driver: none
    ports:
      - 3306:3306
    restart: always

  matomo:
    container_name: matomo
    image: matomo:5.2.1
    user: root
    networks:
      - backend
    volumes:
      - ./matomo-data:/var/www/html
    environment:
      - MATOMO_DATABASE_HOST=matomodb
      - MATOMO_DATABASE_ADAPTER=mysql
      - MATOMO_DATABASE_TABLES_PREFIX=matomo_
      - MATOMO_DATABASE_USERNAME=root
      - MATOMO_DATABASE_PASSWORD=password
      - MATOMO_DATABASE_DBNAME=matomo
      - MATOMO_GENERAL_PROXY_URI_HEADER=1
      - MATOMO_GENERAL_ASSUME_SECURE_PROTOCOL=1
    logging:
      driver: none
    ports:
      - "8080:80"
    restart: always

  elasticmq:
    container_name: elasticmq
    image: softwaremill/elasticmq-native
    ports:
      - "9324:9324"
    networks:
      - backend

volumes:
  postgres-data:
  es-data:
  minio-data:
  matomo-db-data:
  matomo-data:
  rabbitmq-data:

networks:
  backend:
    name: backend
