---
scheduler:
  # ADOT: define common layer+env once and anchor it for reuse, see all
  # functions below for usage of the anchor.
  <<: &adot
    layers:
      - ${self:custom.adotLayerArnSelected}
    environment:
      AWS_LAMBDA_EXEC_WRAPPER: /opt/otel-instrument
      OTEL_PROPAGATORS: xray,tracecontext,baggage
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "0.1"
      OTEL_RESOURCE_ATTRIBUTES: >
        service.name=crossfeed-tasks,
        service.namespace=crossfeed,
        deployment.environment=${self:provider.stage}

  handler: src/xfd_django/xfd_api/tasks/scheduler.handler
  # TODO: Parameterize the timeout value,
  # at a future date see CRASM-3270. See all timeouts below.
  timeout: 900
  events:
    - schedule: rate(5 minutes)
  reservedConcurrency: 1
  memorySize: 4096
  iamRoleStatements:
    - Effect: Allow
      Action:
        - sqs:CreateQueue
        - sqs:ListQueues
        - sqs:ReceiveMessage
        - sqs:DeleteMessage
        - sqs:SendMessage
        - sqs:GetQueueAttributes
      Resource: 'arn:aws:sqs:${self:provider.region}:${aws:accountId}:*'
    - Effect: Allow
      Action:
        - ses:SendEmail
        - ses:SendRawEmail
      Resource: '*'
    - Effect: Allow
      Action:
        - s3:GetObject
        - s3:GetObjectAcl
        - s3:PutObject
        - s3:PutObjectAcl
        - s3:PutBucketAcl
        - s3:GetBucketAcl
      Resource: '*'
    - Effect: Allow
      Action:
        - ecs:RunTask
        - ecs:ListTasks
        - ecs:DescribeTasks
        - ecs:DescribeServices
        - ecs:UpdateService
        - iam:PassRole
        - logs:GetLogEvents
      Resource: '*'
    - Effect: Allow
      Action:
        - iam:PassRole
      Resource: '*'

syncdb:
  <<: *adot
  timeout: 900
  handler: src/xfd_django/xfd_api/tasks/run_syncdb.handler
  iamRoleStatements: []

syncmdl:
  <<: *adot
  timeout: 900
  handler: src/xfd_django/xfd_api/tasks/run_syncmdl.handler
  iamRoleStatements: []

bastion:
  <<: *adot
  timeout: 900
  handler: src/xfd_django/xfd_api/tasks/bastion.handler
  iamRoleStatements:
    - Effect: Allow
      Action:
        - s3:GetObject
        - s3:GetObjectAcl
        - s3:PutObject
        - s3:PutObjectAcl
        - s3:PutBucketAcl
        - s3:GetBucketAcl
      Resource: '*'

checkUserExpiration:
  <<: *adot
  timeout: 300
  handler: src/xfd_django/xfd_api/tasks/checkUserExpiration.handler
  events:
    - schedule: cron(0 0 * * ? *)  # Runs every day at midnight
  iamRoleStatements:
    - Effect: Allow
      Action:
        - ses:SendRawEmail
        - ses:SendEmail
      Resource: '*'
    - Effect: Allow
      Action:
        - cognito-idp:AdminDisableUser
        - cognito-idp:ListUsers
        - cognito-idp:AdminSetUserPassword
      Resource: '*'

queryDailyCustomerMetrics:
  <<: *adot
  timeout: 300
  handler: src/xfd_django/xfd_api/tasks/metrics.collect_and_upsert_customer_metrics
  events:
    - schedule: cron(0 0 * * ? *)  # Runs every day at midnight
  iamRoleStatements: []

scanExecution:
  <<: *adot
  timeout: 900  # 15 minutes
  handler: src/xfd_django/xfd_api/tasks/scanExecution.handler
  memorySize: 4096
  iamRoleStatements:
    - Effect: Allow
      Action:
        - sqs:CreateQueue
        - sqs:ListQueues
        - sqs:ReceiveMessage
        - sqs:DeleteMessage
        - sqs:SendMessage
        - sqs:GetQueueAttributes
      Resource: 'arn:aws:sqs:${self:provider.region}:${aws:accountId}:*'
    - Effect: Allow
      Action:
        - ses:SendEmail
        - ses:SendRawEmail
      Resource: '*'
    - Effect: Allow
      Action:
        - s3:GetObject
        - s3:GetObjectAcl
        - s3:PutObject
        - s3:PutObjectAcl
        - s3:PutBucketAcl
        - s3:GetBucketAcl
      Resource: '*'
    - Effect: Allow
      Action:
        - ecs:RunTask
        - ecs:ListTasks
        - ecs:DescribeTasks
        - ecs:DescribeServices
        - ecs:UpdateService
        - iam:PassRole
        - logs:GetLogEvents
      Resource: '*'
    - Effect: Allow
      Action:
        - iam:PassRole
      Resource: '*'

updateScanTaskStatus:
  <<: *adot
  handler: src/xfd_django/xfd_api/tasks/updateScanTaskStatus.handler
  events:
    - eventBridge:
        name: ${self:provider.stage}-updateScanTaskStatus
        pattern:
          source:
            - aws.ecs
          detail-type:
            - ECS Task State Change
          detail:
            clusterArn:
              - ${file(env.yml):${self:provider.stage}-ecs-cluster, ''}
  iamRoleStatements: []

infraOps:
  <<: *adot
  timeout: 900
  handler: src/xfd_django/xfd_api/tasks/infra_ops.handler
  iamRoleStatements: []

pruneScanResults:
  <<: *adot
  handler: src/xfd_django/xfd_api/tasks/prune_scan_results.handler
  events:
    - schedule:
        rate: cron(0 0 * * ? *)  # This triggers the function every day at midnight
  iamRoleStatements: []

