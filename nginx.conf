# /etc/nginx/nginx.conf
events { }

http {
  resolver 127.0.0.11 valid=30s;
  proxy_ssl_server_name on;

  server {
    listen 80;

    # --- Vite/React overlay endpoint (CRA/Inspector uses fileName/lineNumber/colNumber) ---
    location = /__open-stack-frame-in-editor {
      proxy_http_version 1.1;
      proxy_set_header Connection close;
      proxy_set_header Host host.docker.internal;

      # Forward to your local helper; it will launch VS Code and return 204
      proxy_pass http://host.docker.internal:5667/__open-in-editor?file=$arg_fileName&line=$arg_lineNumber&column=$arg_colNumber;
    }

    # --- react-dev-inspector endpoint (uses file/line/column) ---
    location = /__open-in-editor {
      proxy_http_version 1.1;
      proxy_set_header Connection close;
      proxy_set_header Host host.docker.internal;

      proxy_pass http://host.docker.internal:5667/__open-in-editor?file=$arg_file&line=$arg_line&column=$arg_column;
    }

    # Your Vite dev server
    location / {
      proxy_pass http://frontend:5173$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    # Cognito OAuth
    location /oauth2/authorize {
      proxy_pass https://crossfeed-local-okta-idp.auth.us-east-1.amazoncognito.com$request_uri;
      proxy_set_header Host crossfeed-local-okta-idp.auth.us-east-1.amazoncognito.com;
      proxy_ssl_server_name on;
    }

    # Callback back to Vite
    location /okta-callback {
      proxy_pass http://frontend:5173$request_uri;
      proxy_set_header Host localhost;
    }

    # Backend
    location /notifications {
      proxy_pass http://backend:3000$request_uri;
      proxy_set_header Host backend;
    }
  }
}
