#nginx.conf
events { }

http {
    # Allow Docker’s embedded DNS resolver and enable SNI for HTTPS proxying
    resolver 127.0.0.11 valid=30s;
    proxy_ssl_server_name on;

    server {
        listen 80;

        # 1) Serve your Vite/React app at /
        location / {
            proxy_pass http://frontend:5173$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # 2) Proxy OAuth authorize requests to Cognito (preserve query string)
        location /oauth2/authorize {
            proxy_pass https://crossfeed-local-okta-idp.auth.us-east-1.amazoncognito.com$request_uri;
            proxy_set_header Host crossfeed-local-okta-idp.auth.us-east-1.amazoncognito.com;
            proxy_ssl_server_name on;
        }

        # 3) Proxy the callback path back to your Vite server (preserve query string)
        location /okta-callback {
            proxy_pass http://frontend:5173$request_uri;
            proxy_set_header Host localhost;
        }

        # 4) Proxy API/backend calls (preserve path & query)
        location /notifications {
            proxy_pass http://backend:3000$request_uri;
            proxy_set_header Host backend;
        }

        # 5) Proxy the Open Stack Frame in Editor requests to Vite
#         location /__open-stack-frame-in-editor {
#             proxy_pass http://frontend:5173$request_uri;
#             proxy_http_version 1.1;
#             proxy_set_header Upgrade $http_upgrade;
#             proxy_set_header Connection 'upgrade';
#             proxy_set_header Host $host;
#             proxy_cache_bypass $http_upgrade;
# }

    }
}
